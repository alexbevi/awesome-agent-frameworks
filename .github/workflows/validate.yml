name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate data and README
        run: python3 scripts/validate-data.py
